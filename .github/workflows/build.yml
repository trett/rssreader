name: 'Build and Publish'

on:
  workflow_dispatch:

env:
  GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
  GAR_PROJECT_ID: ${{ secrets.GAR_PROJECT_ID }}
  GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
  IMAGE_NAME: rssreader

jobs:
  Build-Containers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NodeJs
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Google Artifact Registry
        run: |
          gcloud auth configure-docker ${GAR_LOCATION}-docker.pkg.dev

      - name: Set short git commit SHA
        id: vars
        run: echo "DOCKER_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Native Image and Stage Docker
        run: sbt "server/Docker/stage"
        env:
          SBT_OPTS: -Xmx12G
          DOCKER_TAG: ${{ env.DOCKER_TAG }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GAR_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }}
          docker build -t $IMAGE_TAG server/target/docker/stage
          docker push $IMAGE_TAG
